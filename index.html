<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B94E123XFC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B94E123XFC', { send_page_view: false });
  </script>

  <style>
    body { margin: 0; background: #fff; }
  </style>
</head>
<body>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  var LINE_OA_URL = 'https://lin.ee/ZMQLEKZ';
  var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];

  function extractUtm(search) {
    var p = new URLSearchParams(search);
    var utmData = {};

    // Try liff.state first (LIFF encodes params here)
    var liffState = p.get('liff.state');
    if (liffState) {
      try {
        var decoded = decodeURIComponent(liffState);
        if (decoded.charAt(0) === '?') decoded = decoded.slice(1);
        var stateParams = new URLSearchParams(decoded);
        utmKeys.forEach(function(k) {
          if (stateParams.get(k)) utmData[k] = stateParams.get(k);
        });
      } catch(e) {}
    }

    // Fallback: read directly from URL
    if (Object.keys(utmData).length === 0) {
      utmKeys.forEach(function(k) {
        if (p.get(k)) utmData[k] = p.get(k);
      });
    }

    return utmData;
  }

  function fireAndRedirect(utmData) {
    if (typeof gtag !== 'undefined') {
      gtag('set', {
        campaign_source:  utmData.utm_source   || '',
        campaign_medium:  utmData.utm_medium   || '',
        campaign_name:    utmData.utm_campaign || '',
        campaign_content: utmData.utm_content  || '',
        campaign_term:    utmData.utm_term     || ''
      });
      gtag('event', 'page_view', Object.assign({
        page_title:    'LIFF UTM Tracker',
        page_location: window.location.href
      }, utmData));
      gtag('event', 'line_redirect', Object.assign({
        event_category: 'engagement',
        event_label: utmData.utm_campaign || '(none)'
      }, utmData));
    }

    // Small delay to let GA fire before redirect
    setTimeout(function() {
      var dest = new URL(LINE_OA_URL);
      Object.keys(utmData).forEach(function(k) {
        dest.searchParams.set(k, utmData[k]);
      });
      window.location.replace(dest.toString());
    }, 300);
  }

  // Init LIFF to get proper URL after LIFF resolves liff.state
  liff.init({ liffId: '2009829426-ebOZt8Au' })
    .then(function() {
      var utmData = extractUtm(window.location.search);
      fireAndRedirect(utmData);
    })
    .catch(function() {
      var utmData = extractUtm(window.location.search);
      fireAndRedirect(utmData);
    });
</script>
</body>
</html>
